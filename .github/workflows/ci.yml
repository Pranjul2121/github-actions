name: TWS CI workflow

#yeh tb run hoga j developer code push karega ya pull request banayega main branch me
on:
    push:

jobs:
    build-and-push: #job ka name h
        runs-on: ubuntu-latest #github runner which are free to use and have all the necessary tools pre-installed
        steps:
            - name: Checkout code #step ka name h
              uses: actions/checkout@v4 #clone the code into a ubuntu runner
           
            - name: Setup Docker
              uses: docker/setup-buildx-action@v4 #setup docker buildx which is a tool for building multi-platform docker images

            - uses: docker/login-action@v4 #login to docker hub using the credentials stored in github secrets
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }} #docker hub username stored in github secrets
                password: ${{ secrets.DOCKERHUB_TOKEN }} #docker hub password stored in github secrets

            - name: Push to Docker hub
              uses: docker/build-push-action@v7 